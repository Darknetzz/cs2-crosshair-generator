# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration
#
# Used for drafting notes (`git cliff --unreleased`) and optional version
# suggestions (`git cliff --bumped-version`). The curated Keep a Changelog
# file is maintained manually and rotated by scripts/release.sh.

[changelog]
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}**Breaking:** {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true
render_always = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = false
require_conventional = false
split_commits = false
commit_preprocessors = []
protect_breaking_commits = false
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Added" },
    { message = "^fix", group = "<!-- 1 -->Fixed" },
    { message = "^perf", group = "<!-- 2 -->Changed" },
    { message = "^refactor", group = "<!-- 3 -->Changed" },
    { message = "^docs?", group = "<!-- 4 -->Changed" },
    { message = "^style", group = "<!-- 5 -->Changed" },
    { message = "^test", skip = true },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps", skip = true },
    { message = "^chore|^ci", skip = true },
    { message = "^ci", skip = true },
    { body = ".*security", group = "<!-- 6 -->Security" },
    { message = "^revert", group = "<!-- 7 -->Changed" },
    { message = ".*", group = "<!-- 8 -->Changed" },
]
filter_commits = false
fail_on_unmatched_commit = false
link_parsers = []
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
recurse_submodules = false
